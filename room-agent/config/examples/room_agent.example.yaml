# Room Agent配置文件
# 3.18 对齐示例

agent:
  id: "room-agent-1"
  room_id: "bedroom"
  version: "1.0.0"
  home_assistant_mcp:
    enabled: false
    server_name: "home_assistant"
    transport: "streamable_http"
    url: "http://home-assistant.local:8123/mcp"
    auth_token: "YOUR_HA_TOKEN"
    health_check:
      enabled: true

# qwen-backend / AI Gateway 注册配置
gateway:
  url: "http://home-gateway.local"
  register_on_startup: true
  heartbeat_interval: 60
  agent_host: "http://room-agent.local"

# Beacon 绑定配置，仅用于空间绑定声明和 ESP32 固件生成
beacon:
  enabled: true
  uuid: "01234567-89AB-CDEF-0123456789ABCDEF"
  major: 2
  minor: 0
  measured_power: -59
  interval: 1

runtime:
  log_level: "INFO"

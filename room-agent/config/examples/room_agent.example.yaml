# Room Agent配置文件
# 配置字段与根目录 docs/Architect.md、docs/Transport.md 保持一致

agent:
  id: "room-agent-1"
  room_id: "bedroom"
  version: "1.0.0"
  home_assistant_mcp:
    enabled: false
    server_name: "home_assistant"
    transport: "streamable_http"
    base_url: "http://home-assistant.local:8123"
    auth_token: "YOUR_HA_TOKEN"
    health_check:
      enabled: true

# qwen-backend / AI Gateway 注册配置
gateway:
  url: "http://<qwen-backend-ip>:3088"
  register_on_startup: true
  heartbeat_interval: 60
  # agent_host is optional. Omit it to auto-detect the LAN IP at startup/heartbeat.
  # Set it only for fixed domains, reverse proxies, tunnels, or static IP deployments.
  # agent_host: "http://<room-agent-lan-ip>:10000"

# Beacon 绑定配置，仅用于空间绑定声明和 ESP32 固件生成
beacon:
  enabled: true
  beacon_id: "2"
  major: 2
  minor: 0
  measured_power: -59
  interval: 1

runtime:
  log_level: "INFO"

observability:
  enabled: true
  raw_event_dir: ".runtime/observability"
  pricing_file: "config/observability.pricing.json"
  sampling_ratio: 1.0
  prometheus:
    enabled: true
    path: "/metrics"

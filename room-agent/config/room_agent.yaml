# Room Agent配置文件
# 配置字段与根目录 docs/Architect.md、docs/Transport.md 保持一致

agent:
  id: "room-agent-1"
  room_id: "bedroom"
  version: "1.0.0"

# MQTT客户端配置（连接到外部broker）
mqtt:
  broker:
    host: "localhost"
    port: 1883
    username: null
    password: null

# qwen-backend 配置（Beacon API）
backend:
  url: "http://192.168.1.50:3000"  # qwen-backend 服务地址
  register_on_startup: true  # 启动时自动注册
  heartbeat_interval: 60  # 心跳间隔（秒）

# 心跳配置
heartbeat:
  interval: 30  # seconds

# 当前Agent的能力（后续可以添加设备能力）
capabilities:
  - "device_control"
  - "scene_activation"

# BLE Beacon配置（空间感知层）
beacon:
  enabled: false  # Python端不需要广播，由ESP32硬件处理
  uuid: "01234567-89AB-CDEF-0123456789ABCDEF"  # 系统统一UUID
  major: 2  # Room identifier (2=卧室, 1=客厅, 3=书房...)
  minor: 0  # Zone/Position in room (0-65535)
  measured_power: -59  # Calibrated RSSI at 1 meter (-59 for standard beacon)
  interval: 1  # Broadcast interval in seconds

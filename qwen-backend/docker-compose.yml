version: '3.8'

services:
  qwen-backend:
    build: .
    container_name: qwen-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen-plus}
      - PORT=${PORT:-3000}
    env_file:
      - .env
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

services:
  qwen-backend:
    build: .
    container_name: qwen-backend
    image: registry.cn-guangzhou.aliyuncs.com/weishuokun/qwen-backend:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3088:3000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen-plus}
      - PORT=${PORT:-3000}
    env_file:
      - .env
    volumes:
      - qwen-beacon-data:/app/data
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  qwen-beacon-data:
    driver: local

# Mosquitto MQTT Broker配置文件
# 支持Room Agent通信规范（无认证，无TLS）
#
# 配置文档：https://mosquitto.org/man/mosquitto-conf.html

# =================================================
# 全局配置
# =================================================

# 监听地址（容器内）
# Docker模式下使用0.0.0.0监听所有接口
# 端口必须与 docker-compose.yml 中的内部端口一致
listener 1884

# 允许匿名访问（开发环境，生产环境建议启用认证）
allow_anonymous true

# 最大连接数
max_connections -1

# 持久化到数据卷
persistence true
persistence_location /mosquitto/data
autosave_interval 1800

# 日志配置
log_dest stdout
log_facility all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# 消息大小限制（256MB）
# mosquitto 2.x 使用 max_packet_size 替代 message_size_limit
max_packet_size 268435456

# =================================================
# 访问控制列表（ACL）- 基于主题的权限
# =================================================

# 开发环境：禁用 ACL，允许所有客户端读写所有主题（方便 MQTTX 测试）
# 生产环境：取消下面注释以启用 ACL
# acl_file /mosquitto/config/aclfile

# =================================================
# 认证配置（生产环境建议启用）
# =================================================

# 每个监听器是否使用独立配置
# true = 每个listener有独立的认证/ACL设置
# false = 全局使用统一的认证/ACL设置
per_listener_settings false

# 启用认证时，取消以下注释并生成密码文件：
# password_file /mosquitto/config/passwd
# allow_anonymous false

# =================================================
# WebSocket支持
# =================================================

# MQTT over WebSocket（端口9002）
# 端口必须与 docker-compose.yml 中的内部端口一致
listener 9002

# WebSocket配置
protocol websockets
allow_anonymous true

# =================================================
# 日志类型
# =================================================

# 记录订阅、取消订阅、发布和系统消息
# log_type all

# 仅记录错误和警告
# log_type error
# log_type warning

# =================================================
# 连接消息
# =================================================

# 客户端连接/断开时发送的消息
connection_messages true

# 最大主题层级深度
max_queued_messages 1000

# 最大正在进行的消息数
max_inflight_messages 20

# 心跳间隔（秒）
# keepalive_interval 60  # mosquitto 2.x 中此配置项已废弃或改名

# 会话超时（秒）
# session_expiry_interval 3600  # mosquitto 2.x 中此配置项已改名
# 如需设置持久化客户端过期，使用: persistent_client_expiration <duration>
# 例如：persistent_client_expiration 1h  # 1小时

# =================================================
# 性能调优
# =================================================

# 禁用syslog（Docker环境）
# syslog false

# 最大主题长度
# max_topics 200

# 最大QoS级别
# max_qos 2

# 最大保留消息数
# max_retained_messages 100
